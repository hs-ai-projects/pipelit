services:
  feishu-bot:
    build: .
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GITLAB_TOKEN: ${GITLAB_TOKEN}
      PIPELIT_REPO: ${PIPELIT_REPO}
      FRONTEND_REPO: ${FRONTEND_REPO}
      BACKEND_REPO: ${BACKEND_REPO}

    volumes:
      - /root/.claude/pipelit:/root/.claude/pipelit   # 挂载已有 config
      - pipelit-code:/app/pipelit
      - frontend-code:/app/ads-web
      - backend-code:/app/ads

volumes:
  pipelit-code:
  frontend-code:
  backend-code:
