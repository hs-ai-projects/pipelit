services:
  feishu-bot:
    build: .
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL}
      GITLAB_TOKEN: ${GITLAB_TOKEN}
      PIPELIT_REPO: ${PIPELIT_REPO}
      FRONTEND_REPO: ${FRONTEND_REPO}
      BACKEND_REPO: ${BACKEND_REPO}
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_API_KEY}
      ANTHROPIC_DEFAULT_SONNET_MODEL: ${ANTHROPIC_DEFAULT_SONNET_MODEL}
      BOT_ANALYSIS_MODEL: ${BOT_ANALYSIS_MODEL}
      BOT_EXECUTION_MODEL: ${BOT_EXECUTION_MODEL}

    volumes:
      - /root/.claude/pipelit:/root/.claude/pipelit   # 挂载已有 config
      - pipelit-code:/app/pipelit
      - frontend-code:/app/ads-web
      - backend-code:/app/ads

volumes:
  pipelit-code:
  frontend-code:
  backend-code:
